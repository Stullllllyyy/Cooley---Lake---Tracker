<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Huginn — Know More. Hunt Smarter.</title>
<link rel="icon" type="image/svg+xml" href="HuginnFavicon.svg"/>
<link rel="apple-touch-icon" href="HuginnFavicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#121415;
  --surface:#1a1b1c;
  --surface2:#212324;
  --border:#2a2c2e;
  --border2:#363839;
  --gold:#8C7355;
  --gold2:#a08468;
  --sulfur:#E5B53B;
  --tungsten:#4A4D4E;
  --silver:#BCC6CC;
  --text:#BCC6CC;
  --text2:#8a9499;
  --text3:#4A4D4E;
  --font:'Roboto',sans-serif;
  --radius:12px;
}

html,body{
  min-height:100%;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ── NAV ──────────────────────────────────────────── */
.nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 24px;
  background:rgba(18,20,21,0.85);
  border-bottom:1px solid rgba(140,115,85,0.15);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.nav-brand{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
}

.nav-raven{
  height:38px;
  width:auto;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.9));
}

.nav-wordmark{
  display:flex;
  flex-direction:column;
  gap:1px;
}

.nav-title{
  font-size:13px;
  font-weight:700;
  color:var(--gold);
  letter-spacing:2.5px;
  text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,0.9);
  line-height:1;
}

.nav-tagline{
  font-size:8px;
  color:rgba(220,210,190,0.75);
  letter-spacing:2px;
  text-transform:uppercase;
  line-height:1;
}

.nav-cta{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:9px 18px;
  background:var(--gold);
  color:#121415;
  font-size:12px;
  font-weight:700;
  letter-spacing:0.8px;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:8px;
  transition:background 0.2s,transform 0.15s;
}

.nav-cta:hover{background:var(--gold2);transform:translateY(-1px)}
.nav-cta:active{transform:translateY(0)}

/* ── HERO ──────────────────────────────────────────── */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 24px 80px;
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(140,115,85,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(140,115,85,0.05) 0%, transparent 60%);
  pointer-events:none;
}

.hero-wordmark{
  width:100%;
  max-width:900px;
  height:auto;
  display:block;
  margin:0 auto 36px;
  filter:drop-shadow(0 4px 24px rgba(140,115,85,0.25));
}

.hero-tagline{
  font-size:clamp(13px,2.5vw,18px);
  font-weight:400;
  color:var(--gold2);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:20px;
}

.hero-sub{
  font-size:clamp(14px,2vw,17px);
  font-weight:300;
  color:var(--text2);
  max-width:580px;
  line-height:1.7;
  margin:0 auto 44px;
}

.hero-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:16px 36px;
  background:var(--gold);
  color:#121415;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:10px;
  transition:background 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 4px 24px rgba(140,115,85,0.3);
}

.hero-btn:hover{
  background:var(--gold2);
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(140,115,85,0.4);
}

.hero-btn:active{transform:translateY(0)}

.hero-btn-icon{font-size:18px;line-height:1}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:600px){
  .nav{padding:12px 16px}
  .nav-cta{display:none}
  .hero{padding:100px 16px 60px}
  .hero-wordmark{margin-bottom:28px}
  .hero-btn{padding:14px 28px;font-size:13px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="nav-brand">
    <img src="HuginnRaven.png" class="nav-raven" alt="Huginn"/>
    <div class="nav-wordmark">
      <span class="nav-title">Huginn</span>
      <span class="nav-tagline">Know More. Hunt Smarter.</span>
    </div>
  </a>
  <a href="/app" class="nav-cta">
    Open App
  </a>
</nav>

<!-- HERO -->
<section class="hero">
  <img
    src="/images/huginntype.png"
    class="hero-wordmark"
    alt="Huginn"
  />

  <p class="hero-tagline">Know More. Hunt Smarter.</p>

  <p class="hero-sub">
    Whitetail hunting intelligence — log trail camera sightings, track named bucks,
    analyze movement patterns, and get AI-powered hunt recommendations for your property.
  </p>

  <a href="/app" class="hero-btn">
    <span class="hero-btn-icon">🦌</span>
    Get Started
  </a>
</section>

</body>
</html>
